name: Refresh market data

# Re-pulls spot + 14-day history for every item (both regions) into index.html every
# 6 hours and commits if anything changed (which re-deploys Pages). refresh_deals.py
# only rewrites when prices actually moved, so this commits only on real changes.

on:
  schedule:
    - cron: '0 */6 * * *'    # 00/06/12/18 UTC
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh-deals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh prices into index.html
        run: python3 refresh_deals.py
      - name: Commit & push if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No change."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Auto-refresh market data"
            git push
          fi
